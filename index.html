<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Minha Mayra 💕 1 Mês</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#d4af37;--gold-l:#f5e070;--pink:#ff2d78;--red:#ff0044;
  --bg:#07000f;--machine:#1a0820;--heart:#ff1744;--textpink:#ffb3d1;
  --white: #ffffff;
  --dim: rgba(255,255,255,0.4);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow-x:hidden;
  font-family:'Montserrat', sans-serif;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(255,45,120,.1) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 50%,rgba(150,0,200,.08) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 0%,rgba(255,0,68,.06) 0%,transparent 45%);
}

/* FLOATING BG HEARTS */
.bh{position:fixed;bottom:-60px;font-size:1.4rem;opacity:0;pointer-events:none;animation:fup linear infinite}
@keyframes fup{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:.25}90%{opacity:.12}100%{transform:translateY(-105vh) rotate(400deg);opacity:0}}

/* TITLE */
.ttl{text-align:center;margin-bottom:2.2rem;position:relative;z-index:10}
.ttl h1{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(1.4rem,5vw,2.8rem);
  color:var(--gold);
  text-shadow:0 0 18px rgba(212,175,55,.9),0 0 40px rgba(212,175,55,.4);
  letter-spacing:.05em;line-height:1.3;
}
.ttl p{
  font-family:'Dancing Script',cursive;font-size:clamp(1.1rem,3vw,1.6rem);
  color:var(--textpink);margin-top:.6rem;
  text-shadow:0 0 12px rgba(255,179,209,.5);
}

/* MACHINE */
.mwrap{display:flex;align-items:center;gap:0;position:relative;z-index:10}
.machine{
  background:linear-gradient(160deg,#2d1040 0%,#1a0820 45%,#0d0515 100%);
  border:3px solid var(--gold);border-radius:22px 22px 32px 32px;
  padding:28px;width:clamp(310px,85vw,400px);
  box-shadow:0 0 35px rgba(212,175,55,0.3), inset 0 0 30px rgba(0,0,0,0.5),0 25px 70px rgba(0,0,0,0.85);
}
.machine.winning{
  animation:shake .55s ease-in-out;
  box-shadow:0 0 80px rgba(255,45,120,.9),0 0 40px rgba(212,175,55,.6)!important;
}
@keyframes shake{
  0%{transform:translateX(0)}10%{transform:translateX(-6px) rotate(-1.2deg)}
  20%{transform:translateX(6px) rotate(1.2deg)}100%{transform:translateX(0)}
}

/* REELS */
.rc{
  display:flex;gap:8px;justify-content:center;
  background:linear-gradient(180deg,#000 0%,#060010 100%);
  border:2px solid rgba(212,175,55,.5);border-radius:14px;
  padding:10px;
  box-shadow:inset 0 0 25px rgba(0,0,0,0.9);
  margin-bottom:18px;
  overflow: hidden;
}
.rwin{
  width:88px;height:240px;overflow:hidden;
  border:1px solid rgba(212,175,55,0.3);border-radius:10px;
  position:relative;background:#000;
}
.rwin::after {
  content: '';
  position: absolute;
  top: 80px;
  left: 0;
  width: 100%;
  height: 80px;
  border-top: 2px solid rgba(212, 175, 55, 0.4);
  border-bottom: 2px solid rgba(212, 175, 55, 0.4);
  background: rgba(212, 175, 55, 0.05);
  pointer-events: none;
  z-index: 5;
}
.rstrip{display:flex;flex-direction:column;will-change:transform}
.rcell{
  width:88px;height:80px;display:flex;align-items:center;justify-content:center;
  font-size:2.8rem;user-select:none;line-height:1;
}

/* LEVER */
.lever{
  display:flex;flex-direction:column;align-items:center;
  margin-left:18px;cursor:pointer;user-select:none;
}
.lv-track{
  width:22px;height:190px;
  background:linear-gradient(180deg,#1a0a1a,#0d0010);
  border:2px solid rgba(212,175,55,.4);border-radius:11px;
  position:relative;
}
.lv-ball{
  position:absolute;top:10px;left:50%;
  transform:translateX(-50%);
  width:38px;height:38px;border-radius:50%;
  background:radial-gradient(circle at 33% 33%,var(--gold-l),var(--gold) 55%,#7a5a10);
  box-shadow:0 0 18px rgba(212,175,55,.7);
  z-index:2;transition:top .2s;
}
.lv-shaft{
  position:absolute;top:29px;left:50%;width:7px;height:145px;
  background:linear-gradient(90deg,#7a5a10,var(--gold),#7a5a10);
  transform:translateX(-50%);border-radius:3px;
}

/* ── POPUP (AS PER IMAGE & CODE) ── */
#popup{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(calc(100% + 50px));
  width:min(380px,calc(100vw - 24px));
  background:rgba(5,5,5,.94);
  border:1px solid rgba(255,255,255,.1);border-radius:24px;
  padding:22px;
  backdrop-filter:blur(32px) saturate(1.6);
  box-shadow:0 32px 90px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.04);
  z-index:300;opacity:0;
  transition:transform .48s cubic-bezier(.34,1.56,.64,1),opacity .38s ease;
  color: white;
}
#popup.on{transform:translateX(-50%) translateY(0);opacity:1}

.pt{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.pa{width:54px;height:54px;border-radius:12px;overflow:hidden;background:#111;flex-shrink:0;position:relative}
.pa img{width:100%;height:100%;object-fit:cover;display:block}
.pa-r{
  position:absolute;inset:0;border-radius:12px;
  border:1px solid rgba(200,169,126,.3);
  animation:spin 9s linear infinite paused;
}
.pa-r.sp{animation-play-state:running}
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.pm{flex:1;min-width:0}
.pm strong{display:block;font-size:13px;font-weight:400;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm span{font-size:11px;color:var(--dim)}
.px{background:none;border:none;cursor:pointer;color:var(--dim);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s}
.px:hover{color:var(--white);background:rgba(255,255,255,.08)}

/* vis */
#vis{width:100%;height:38px;border-radius:8px;margin-bottom:12px;background:rgba(255,255,255,.02); display: flex; align-items: center; justify-content: center; gap: 3px;}
.bar { width: 3px; background: var(--gold); border-radius: 1px; animation: bounce 1s ease-in-out infinite alternate; }
@keyframes bounce { from { height: 5px; } to { height: 25px; } }

/* progress */
.pg{height:3px;border-radius:99px;background:rgba(255,255,255,.08);cursor:pointer;position:relative;margin-bottom:8px}
.pf{height:100%;border-radius:99px;width:0%;background:linear-gradient(90deg,var(--gold),#e8c97a);pointer-events:none}
.pd{position:absolute;top:50%;left:0%;transform:translate(-50%,-50%) scale(0);width:12px;height:12px;border-radius:50%;background:#fff;pointer-events:none;transition:transform .15s}
.pg:hover .pd{transform:translate(-50%,-50%) scale(1)}

.tr{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.15em;color:var(--dim);margin-bottom:14px}

/* controls */
.ct{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:16px}
.cb{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;border-radius:50%;padding:6px;transition:color .2s,transform .18s}
.cb:hover{color:var(--white);transform:scale(1.2)}
.cb.pp{width:52px;height:52px;padding:0;background:var(--white);color:#000!important;border-radius:50%;box-shadow:0 4px 26px rgba(255,255,255,.18);transition:background .2s,transform .18s}
.cb.pp:hover{background:#ddd;transform:scale(1.07)}

/* vol */
.vr{display:flex;align-items:center;gap:10px}
.vr svg{color:var(--dim);flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:3px;border-radius:99px;cursor:pointer;background:rgba(255,255,255,.1);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;margin-top:0px;box-shadow:0 2px 8px rgba(0,0,0,.5);transition:transform .15s}

/* LETTER OVERLAY (RESTORED NEON STYLE) */
.loverlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.92);
  backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .6s;padding:20px;
}
.loverlay.vis{opacity:1;pointer-events:all}

.letter-card{
  background:linear-gradient(145deg,#2d0030 0%,#1a001a 50%,#200025 100%);
  border:2px solid rgba(255,45,120,.5);border-radius:18px;
  padding:clamp(20px,5vw,40px);
  width:min(450px,90vw);
  box-shadow:0 0 50px rgba(255,45,120,.45),inset 0 0 40px rgba(0,0,0,.4);
  position:relative;overflow-y:auto;max-height:80vh;
  transform:scale(.8) translateY(40px);
  transition:transform .6s cubic-bezier(.175, .885, 0.32, 1.275);
  z-index: 210;
}
.loverlay.vis .letter-card{transform:scale(1) translateY(0)}

.letter-body{
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size:clamp(0.95rem, 2.2vw, 1.1rem);
  color:var(--textpink);line-height:1.7;text-align:left;
  white-space: pre-wrap;
}
.letter-greeting{
  font-family:'Cinzel Decorative',cursive;font-size:1.4rem;
  color:var(--gold);margin-bottom:15px;text-align:center;
}

/* FLYING PHOTOS */
.flying-photo {
  position: fixed;
  width: 160px;
  height: auto;
  border: 3px solid var(--gold);
  border-radius: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.9);
  z-index: 205;
  opacity: 0;
  transform: translate(-50%, -50%) scale(0);
  transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.flying-photo.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1) rotate(var(--rot));
}

.close-btn{
  position:absolute;top:15px;right:18px;
  background:rgba(255,45,120,.15);border:1px solid rgba(255,45,120,.4);
  color:var(--textpink);font-size:1.2rem;border-radius:50%;
  width:34px;height:34px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:10;
}

#hcanvas{position:fixed;inset:0;pointer-events:none;z-index:100}
.win-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  z-index:160;font-family:'Cinzel Decorative',cursive;
  font-size:clamp(2rem,8vw,4rem);color:var(--gold);
  text-shadow:0 0 30px rgba(212,175,55,.9);
  transition:transform .5s cubic-bezier(.175,.885,.32,1.275);
  pointer-events:none;
}
.win-banner.show{transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>

<canvas id="hcanvas"></canvas>
<audio id="love-song" src="chicletinho.mp3" loop></audio>

<!-- Correct Popup Style -->
<div id="popup">
  <div class="pt">
    <div class="pa">
      <img src="img/foto1.png">
      <div class="pa-r" id="disc"></div>
    </div>
    <div class="pm">
      <strong>Vai Ser Só no Fodi Fodi</strong>
      <span>música</span>
    </div>
    <button class="px" onclick="closeLetter()">&times;</button>
  </div>
  <div id="vis">
    <div class="bar" style="animation-delay: 0.1s"></div>
    <div class="bar" style="animation-delay: 0.3s"></div>
    <div class="bar" style="animation-delay: 0.2s"></div>
    <div class="bar" style="animation-delay: 0.5s"></div>
    <div class="bar" style="animation-delay: 0.4s"></div>
    <div class="bar" style="animation-delay: 0.1s"></div>
  </div>
  <div class="pg" onclick="seek(event)">
    <div class="pf" id="progressFill"></div>
    <div class="pd" id="progressDot"></div>
  </div>
  <div class="tr">
    <span id="currentTime">0:00</span>
    <span id="duration">3:11</span>
  </div>
  <div class="ct">
    <button class="cb">⏮</button>
    <button class="cb pp" id="playBtn" onclick="toggleMusic()">▶</button>
    <button class="cb">⏭</button>
  </div>
  <div class="vr">
    <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M11.536 14.01A8.473 8.473 0 0 0 14.026 8a8.473 8.473 0 0 0-2.49-6.01l-.708.707A7.476 7.476 0 0 1 13.025 8c0 2.071-.84 3.946-2.197 5.303l.708.707z"/></svg>
    <input type="range" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">
  </div>
</div>

<div class="ttl">
    <h1>1 Mês de Namoro</h1>
    <p>A melhor escolha da minha vida</p>
    <div style="font-size:2rem; color:var(--gold); margin-top:10px;">Henrique & Mayra 💕</div>
</div>

<div class="mwrap">
    <div class="machine" id="machine">
        <div class="rc">
            <div class="rwin"><div class="rstrip" id="r1"></div></div>
            <div class="rwin"><div class="rstrip" id="r2"></div></div>
            <div class="rwin"><div class="rstrip" id="r3"></div></div>
        </div>
        <div style="text-align:center; color:var(--textpink); font-size:0.9rem;">Puxe a alavanca, meu amor!</div>
    </div>

    <div class="lever" onclick="pullLever()">
        <div class="lv-track">
            <div class="lv-ball" id="lever-ball"></div>
            <div class="lv-shaft"></div>
        </div>
        <div style="margin-top:10px; color:var(--gold); font-weight:bold;">PUXE</div>
    </div>
</div>

<div class="win-banner" id="winBanner">VOCÊ GANHOU! ❤️</div>

<div class="loverlay" id="letterOverlay">
    <img src="img/foto1.png" class="flying-photo" id="fp1">
    <img src="img/foto2.png" class="flying-photo" id="fp2">
    <img src="img/foto3.png" class="flying-photo" id="fp3">
    <img src="img/foto4.png" class="flying-photo" id="fp4">
    <img src="img/foto5.png" class="flying-photo" id="fp5">

    <div class="letter-card">
        <button class="close-btn" onclick="closeLetter()">&times;</button>
        <div class="letter-greeting">Para minha princesa, Mayra</div>
        <div class="letter-body" id="letterBody"></div>
    </div>
</div>

<script>
const canvas = document.getElementById('hcanvas');
const ctx = canvas.getContext('2d');
let heartParticles = [];

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function createBGHeart(){
  const h = document.createElement('div');
  h.className = 'bh';
  h.innerHTML = ['❤️','💖','💕','💗'][Math.floor(Math.random()*4)];
  h.style.left = Math.random()*100+'vw';
  h.style.animationDuration = (Math.random()*3+4)+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), 7000);
}
setInterval(createBGHeart, 500);

// Audio Logic
const song = document.getElementById('love-song');
const playBtn = document.getElementById('playBtn');
const progressFill = document.getElementById('progressFill');
const progressDot = document.getElementById('progressDot');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');
const disc = document.getElementById('disc');

function toggleMusic() {
  if (song.paused) {
    song.play();
    playBtn.textContent = 'II';
    disc.classList.add('sp');
  } else {
    song.pause();
    playBtn.textContent = '▶';
    disc.classList.remove('sp');
  }
}

function setVolume(v) { song.volume = v; }

song.ontimeupdate = () => {
  const pct = (song.currentTime / song.duration) * 100;
  progressFill.style.width = pct + '%';
  progressDot.style.left = pct + '%';
  currentTimeEl.textContent = formatTime(song.currentTime);
};

song.onloadedmetadata = () => { durationEl.textContent = formatTime(song.duration); };

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s < 10 ? '0' : ''}${s}`;
}

function seek(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const pct = x / rect.width;
  song.currentTime = pct * song.duration;
}

// Heart Explosion
function explodeHearts() {
  const emojis = ['❤️','💕','💖','💗','💓','💝'];
  for(let i=0; i<100; i++) {
    heartParticles.push({
      x: window.innerWidth / 2, y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20 - 5,
      size: Math.random() * 20 + 20, emoji: emojis[Math.floor(Math.random() * emojis.length)],
      gravity: 0.2, alpha: 1, decay: Math.random() * 0.01 + 0.005
    });
  }
  animateHearts();
}

function animateHearts() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  heartParticles.forEach((p, index) => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.alpha -= p.decay;
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.font = `${p.size}px serif`;
    ctx.fillText(p.emoji, p.x, p.y);
    if(p.alpha <= 0) heartParticles.splice(index, 1);
  });
  if(heartParticles.length > 0) requestAnimationFrame(animateHearts);
}

// Slot Machine
const r1 = document.getElementById('r1'), r2 = document.getElementById('r2'), r3 = document.getElementById('r3');
const emojis_reel = ['❤️','💍','🌹','✨','🧸','💌'];

function fillReel(reel){
  reel.innerHTML = '';
  for(let i=0; i<60; i++){
    const div = document.createElement('div');
    div.className = 'rcell';
    div.innerHTML = emojis_reel[Math.floor(Math.random()*emojis_reel.length)];
    reel.appendChild(div);
  }
  reel.children[55].innerHTML = '❤️';
}
fillReel(r1); fillReel(r2); fillReel(r3);

let spinning = false;
function pullLever(){
  if(spinning) return;
  spinning = true;
  const ball = document.getElementById('lever-ball');
  ball.style.top = '150px';
  setTimeout(()=> ball.style.top = '10px', 300);

  [r1, r2, r3].forEach((r, i)=>{
    r.style.transition = 'none'; r.style.transform = 'translateY(0)';
    r.offsetHeight; 
    r.style.transition = `transform ${3 + i}s cubic-bezier(0.1, 0, 0.1, 1)`;
    r.style.transform = 'translateY(-4320px)';
  });

  setTimeout(()=>{
    document.getElementById('winBanner').classList.add('show');
    document.getElementById('machine').classList.add('winning');
    explodeHearts();
    song.play().catch(e => console.log(e));
    playBtn.textContent = 'II';
    disc.classList.add('sp');
    setTimeout(showLetter, 2000);
    spinning = false;
  }, 5500);
}

const letterText = `Desde que eu te conheci no Mushyoo, eu não consigo te tirar da minha mente... Você é a pessoa mais importante para mim.

Cada mensagem sua ilumina meu dia de um jeito que eu nunca esperei. Cada momento com você, mesmo que seja pela tela, vale mais do que eu consigo expressar com palavras.

Esse mês foi o mais especial que eu já tive. Você apareceu do nada e mudou tudo — e eu agradeço todos os dias por isso. Não importa a distância, porque o que sinto por você é real, é lindo, e é todo meu.

Feliz 1 mês de namoro, minha princesa. Eu te amo muito! ❤️`;

function showLetter(){
  const overlay = document.getElementById('letterOverlay'), body = document.getElementById('letterBody');
  const popup = document.getElementById('popup');
  body.textContent = '';
  overlay.classList.add('vis');
  popup.classList.add('on');

  const positions = [
    { top: '20%', left: '15%', rot: '-15deg' },
    { top: '15%', left: '85%', rot: '12deg' },
    { top: '80%', left: '15%', rot: '10deg' },
    { top: '85%', left: '85%', rot: '-12deg' },
    { top: '50%', left: '90%', rot: '5deg' }
  ];

  document.querySelectorAll('.flying-photo').forEach((p, idx) => {
    p.style.top = '50%'; p.style.left = '50%';
    setTimeout(() => {
      p.classList.add('show');
      p.style.top = positions[idx].top;
      p.style.left = positions[idx].left;
      p.style.setProperty('--rot', positions[idx].rot);
    }, 500 + (idx * 250));
  });

  let i = 0;
  function type(){
    if(i < letterText.length){
      body.textContent += letterText[i++];
      setTimeout(type, 35);
    }
  }
  setTimeout(type, 800);
}

function closeLetter(){
  document.getElementById('letterOverlay').classList.remove('vis');
  document.getElementById('winBanner').classList.remove('show');
  document.getElementById('machine').classList.remove('winning');
  document.getElementById('popup').classList.remove('on');
  document.querySelectorAll('.flying-photo').forEach(p => p.classList.remove('show'));
  song.pause();
  playBtn.textContent = '▶';
  disc.classList.remove('sp');
}
</script>
</body>
</html>
